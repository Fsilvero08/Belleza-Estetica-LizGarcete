<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Belleza Estetica Liz Garcete</title>

    <link href="bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --fondo: #111111;
            --fondo-secundario: #1c1c1c;
            --principal: #E8B4B8;
            --principal-hover: #F3C9CD;
            --texto: #ffffff;
        }

        body {
            background: #111111;
            color: white;

        }

        .navbar {
            background: transparent !important;
            position: absolute;
            width: 100%;
            z-index: 999;
        }

        .navbar-brand {
            color: white !important;
            font-size: 2rem;
            font-family: cursive;
        }

        .nav-link {
            color: white !important;
            margin-left: 15px;
            transition: .3s;
        }

        .nav-link:hover {
            color: #e8b4b8 !important;
        }

        .hero {
            min-height: 100vh;

            background:
                linear-gradient(90deg,
                    rgba(0, 0, 0, .85) 20%,
                    rgba(0, 0, 0, .45) 60%,
                    rgba(0, 0, 0, .15) 100%),
                url('img.png');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            align-items: center;
            position: relative;
        }

        .hero-content {
            max-width: 650px;
            padding-left: 8%;
        }

        .hero-subtitle {
            color: #c8b38a;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: .9rem;
            margin-bottom: 15px;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 300;
            color: white;
            line-height: 1.1;
        }

        .hero-title span {
            color: #e8b4b8;
            font-weight: 600;
        }

        .hero-text {
            color: #d6d6d6;
            font-size: 1.15rem;
            margin-top: 20px;
            margin-bottom: 35px;
        }

        .btn-reserva {
            background: #e8b4b8;
            color: #111;
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: .3s;
        }

        .btn-reserva:hover {
            background: #f5d1d4;
            transform: translateY(-3px);
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
            font-size: 3rem;
            color: white;
            font-weight: 300;
        }

        .section-title::after {
            content: '';
            width: 100px;
            height: 3px;
            background: #e8b4b8;
            display: block;
            margin: 15px auto;
        }

        .card {
            background: rgba(255, 255, 255, .03);
            backdrop-filter: blur(10px);

            border: 1px solid rgba(232, 180, 184, .2);

            border-radius: 20px;

            transition: .4s;
        }

        .card:hover {
            transform: translateY(-10px);

            border-color: #e8b4b8;

            box-shadow:
                0 10px 40px rgba(232, 180, 184, .15);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">
                Belleza Estetica Liz Garcete
            </a>
        </div>
    </nav>

    <section class="hero">

        <div class="hero-content">

            <div class="hero-subtitle">
                BELLEZA • ESTILO • ELEGANCIA
            </div>

            <h1 class="hero-title">
                Somos tu
                <span>belleza</span>
            </h1>

            <p class="hero-text">
                Realzamos tu belleza con técnicas modernas y atención personalizada.
            </p>
